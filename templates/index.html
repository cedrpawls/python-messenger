<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python Messenger</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: #131217;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }

        /* Основной контейнер */
        .container {
            width: 452px;
            height: 571px;
            background: #1D1C26;
            border-radius: 24px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.5);
        }

        /* Экран входа */
        .login-screen {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            z-index: 10;
            background: #1D1C26;
            transition: opacity 0.3s, visibility 0.3s;
        }

        .login-screen.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .login-screen .icon {
            width: 60px;
            height: 60px;
            background: rgba(0, 119, 255, 0.2);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin-bottom: 20px;
        }

        .login-screen h1 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 6px;
            color: #fff;
        }

        .login-screen .subtitle {
            font-size: 13px;
            color: #6B6A75;
            margin-bottom: 28px;
        }

        .tabs {
            display: flex;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 20px;
            width: 100%;
            max-width: 280px;
        }

        .tab {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            color: #6B6A75;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
        }

        .tab.active {
            background: rgba(0, 119, 255, 0.3);
            color: #fff;
        }

        .login-form {
            width: 100%;
            max-width: 280px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .login-form input {
            padding: 14px 16px;
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            font-size: 14px;
            color: #fff;
            transition: border-color 0.3s, background 0.3s;
            font-family: 'Inter', sans-serif;
            outline: none;
        }

        .login-form input::placeholder {
            color: #4A4955;
        }

        .login-form input:focus {
            border-color: rgba(0, 119, 255, 0.5);
            background: rgba(0, 0, 0, 0.4);
        }

        .login-form button {
            padding: 14px;
            background: rgba(0, 119, 255, 0.25);
            color: #fff;
            border: none;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
        }

        .login-form button:hover {
            background: rgba(0, 119, 255, 0.45);
            transform: translateY(-1px);
        }

        .message-box {
            margin-top: 12px;
            font-size: 12px;
            text-align: center;
            min-height: 20px;
        }

        .message-box .error {
            color: #FF4D6A;
        }

        .message-box .success {
            color: #4ADE80;
        }

        /* Основной интерфейс */
        .main-interface {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            z-index: 5;
            transition: opacity 0.3s, visibility 0.3s;
        }

        .main-interface.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        /* Хедер */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 20px 12px;
        }

        .user-badge {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            background: rgba(0, 119, 255, 0.25);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 700;
            color: #fff;
        }

        .user-name {
            font-size: 15px;
            font-weight: 600;
        }

        .user-id-label {
            font-size: 11px;
            color: #6B6A75;
        }

        .logout-btn {
            width: 36px;
            height: 36px;
            background: rgba(255, 255, 255, 0.05);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            color: #6B6A75;
            font-size: 16px;
            transition: all 0.2s;
        }

        .logout-btn:hover {
            background: rgba(255, 77, 106, 0.2);
            color: #FF4D6A;
        }

        /* Поле ввода ID друга */
        .add-friend-area {
            padding: 0 20px;
            position: relative;
        }

        .add-friend-area input {
            width: 267px;
            height: 64px;
            background: rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 19px;
            padding: 0 50px 0 20px;
            color: #fff;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            outline: none;
        }

        .add-friend-area input::placeholder {
            color: #4A4955;
        }

        .add-friend-area .add-btn {
            position: absolute;
            right: 28px;
            top: 50%;
            transform: translateY(-50%);
            width: 36px;
            height: 36px;
            background: rgba(0, 119, 255, 0.25);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            color: #fff;
            font-size: 18px;
            transition: all 0.2s;
        }

        .add-friend-area .add-btn:hover {
            background: rgba(0, 119, 255, 0.5);
        }

        .add-friend-message {
            padding: 4px 20px;
            font-size: 11px;
            min-height: 18px;
        }

        .add-friend-message .error {
            color: #FF4D6A;
        }

        .add-friend-message .success {
            color: #4ADE80;
        }

        /* Список друзей */
        .friends-section {
            padding: 6px 20px 0;
            flex: 1;
            overflow-y: auto;
        }

        .friends-section .section-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #4A4955;
            margin-bottom: 8px;
        }

        .friend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            background: rgba(23, 28, 130, 0.15);
            border-radius: 14px;
            margin-bottom: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .friend-item:hover {
            background: rgba(23, 28, 130, 0.3);
        }

        .friend-item.active {
            background: rgba(0, 119, 255, 0.25);
        }

        .friend-avatar {
            width: 36px;
            height: 36px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            font-weight: 600;
            flex-shrink: 0;
        }

        .friend-info {
            flex: 1;
            min-width: 0;
        }

        .friend-name {
            font-size: 13px;
            font-weight: 500;
        }

        .friend-status-text {
            font-size: 11px;
            color: #6B6A75;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .status-dot.online {
            background: #4ADE80;
            box-shadow: 0 0 8px rgba(74, 222, 128, 0.5);
        }

        .status-dot.offline {
            background: #3A3945;
        }

        .empty-friends {
            text-align: center;
            color: #4A4955;
            font-size: 12px;
            padding: 20px;
        }

        /* Чат */
        .chat-screen {
            position: absolute;
            inset: 0;
            background: #1D1C26;
            z-index: 20;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        .chat-screen.hidden {
            transform: translateX(100%);
            opacity: 0;
            pointer-events: none;
        }

        .chat-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .back-btn {
            width: 34px;
            height: 34px;
            background: rgba(255, 255, 255, 0.05);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            color: #fff;
            font-size: 16px;
            transition: all 0.2s;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .chat-friend-name {
            font-size: 15px;
            font-weight: 600;
            flex: 1;
        }

        .chat-friend-status {
            font-size: 11px;
            color: #6B6A75;
        }

        .chat-friend-status .dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            margin-right: 4px;
        }

        .chat-friend-status .dot.online {
            background: #4ADE80;
        }

        .chat-friend-status .dot.offline {
            background: #3A3945;
        }

        /* Сообщения */
        .chat-messages {
            flex: 1;
            padding: 16px 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: rgba(0, 0, 0, 0.1);
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 80%;
        }

        .message.sent {
            align-self: flex-end;
            align-items: flex-end;
        }

        .message.received {
            align-self: flex-start;
            align-items: flex-start;
        }

        .message-bubble {
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 13px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .message.sent .message-bubble {
            background: rgba(0, 119, 255, 0.3);
            color: #fff;
            border-bottom-right-radius: 6px;
        }

        .message.received .message-bubble {
            background: rgba(23, 28, 130, 0.25);
            color: #fff;
            border-bottom-left-radius: 6px;
        }

        .message-time {
            font-size: 10px;
            color: #4A4955;
            margin-top: 2px;
            padding: 0 4px;
        }

        .message-sender {
            font-size: 11px;
            color: #6B6A75;
            margin-bottom: 2px;
            padding: 0 4px;
        }

        .empty-chat-message {
            text-align: center;
            color: #4A4955;
            font-size: 13px;
            margin: auto;
        }

        /* Поле ввода сообщения */
        .chat-input-area {
            padding: 12px 20px 16px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .chat-input-area input {
            width: 267px;
            height: 48px;
            background: rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 19px;
            padding: 0 20px;
            color: #fff;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: border-color 0.3s;
        }

        .chat-input-area input::placeholder {
            color: #4A4955;
        }

        .chat-input-area input:focus {
            border-color: rgba(0, 119, 255, 0.4);
        }

        .send-btn {
            width: 48px;
            height: 48px;
            background: rgba(0, 119, 255, 0.25);
            border: none;
            border-radius: 19px;
            cursor: pointer;
            color: #fff;
            font-size: 18px;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .send-btn:hover {
            background: rgba(0, 119, 255, 0.5);
        }

        /* Уведомление */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #2A2936;
            color: #fff;
            padding: 12px 20px;
            border-radius: 14px;
            font-size: 13px;
            z-index: 100;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        /* Скроллбар */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 2px;
        }
    </style>
</head>
<body>
    <div class="container" id="app-container">
        <!-- Экран входа -->
        <div class="login-screen" id="login-screen">
            <div class="icon">💬</div>
            <h1>Мессенджер</h1>
            <p class="subtitle">Общайтесь с друзьями по ID</p>

            <div class="tabs">
                <button class="tab active" onclick="switchTab('login')">Вход</button>
                <button class="tab" onclick="switchTab('register')">Регистрация</button>
            </div>

            <div id="form-login" class="login-form">
                <input type="text" id="input-login-id" placeholder="Ваш ID">
                <button onclick="doLogin()">Войти</button>
            </div>

            <div id="form-register" class="login-form" style="display:none;">
                <input type="text" id="input-register-name" placeholder="Придумайте имя">
                <button onclick="doRegister()">Создать аккаунт</button>
            </div>

            <div class="message-box" id="login-message"></div>
        </div>

        <!-- Основной интерфейс -->
        <div class="main-interface hidden" id="main-interface">
            <!-- Хедер -->
            <div class="header">
                <div class="user-badge">
                    <div class="user-avatar" id="avatar-letter">?</div>
                    <div>
                        <div class="user-name" id="display-username">Пользователь</div>
                        <div class="user-id-label">ID: <span id="display-userid"></span></div>
                    </div>
                </div>
                <button class="logout-btn" onclick="doLogout()" title="Выйти">↩</button>
            </div>

            <!-- Добавление друга -->
            <div class="add-friend-area">
                <input type="text" id="input-friend-id" placeholder="Введите ID друга">
                <button class="add-btn" onclick="doAddFriend()">+</button>
            </div>
            <div class="add-friend-message" id="add-friend-msg"></div>

            <!-- Список пользователей -->
            <div class="friends-section" id="friends-section">
                <div class="section-title">Пользователи онлайн</div>
                <div id="friends-list"></div>
            </div>
        </div>

        <!-- Экран чата -->
        <div class="chat-screen hidden" id="chat-screen">
            <div class="chat-header">
                <button class="back-btn" onclick="closeChat()">←</button>
                <div>
                    <div class="chat-friend-name" id="chat-friend-name">Имя</div>
                    <div class="chat-friend-status" id="chat-friend-status">
                        <span class="dot offline"></span> Не в сети
                    </div>
                </div>
            </div>
            <div class="chat-messages" id="chat-messages">
                <div class="empty-chat-message">Нет сообщений</div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="input-message" placeholder="Сообщение..." onkeydown="handleEnter(event)">
                <button class="send-btn" onclick="sendMessage()">➤</button>
            </div>
        </div>
    </div>

    <script>
        // ====== СОСТОЯНИЕ ======
        let socket = null;
        let myUser = null;          // { id, username }
        let currentFriend = null;   // { id, username, status }
        let allUsers = [];

        // ====== ВКЛАДКИ ======
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('form-login').style.display = tab === 'login' ? 'flex' : 'none';
            document.getElementById('form-register').style.display = tab === 'register' ? 'flex' : 'none';
            document.getElementById('login-message').innerHTML = '';
        }

        function showLoginMsg(text, type) {
            const el = document.getElementById('login-message');
            el.innerHTML = `<span class="${type}">${text}</span>`;
            setTimeout(() => el.innerHTML = '', 4000);
        }

        function showToast(text) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = text;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3500);
        }

        // ====== РЕГИСТРАЦИЯ ======
        async function doRegister() {
            const name = document.getElementById('input-register-name').value.trim();
            if (!name || name.length < 3) {
                showLoginMsg('Минимум 3 символа', 'error');
                return;
            }
            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: name })
                });
                const data = await res.json();
                if (res.ok) {
                    showLoginMsg(`Готово! Ваш ID: ${data.user_id}`, 'success');
                    document.getElementById('input-login-id').value = data.user_id;
                    setTimeout(() => alert(`Ваш ID: ${data.user_id}\nСохраните его!`), 600);
                } else {
                    showLoginMsg(data.error || 'Ошибка', 'error');
                }
            } catch (e) {
                showLoginMsg('Сервер недоступен', 'error');
            }
        }

        // ====== ВХОД ======
        function doLogin() {
            const id = document.getElementById('input-login-id').value.trim();
            if (!id) { showLoginMsg('Введите ID', 'error'); return; }
            connectSocket(id);
        }

        function doLogout() {
            if (socket) socket.disconnect();
            socket = null;
            myUser = null;
            currentFriend = null;
            allUsers = [];
            document.getElementById('login-screen').classList.remove('hidden');
            document.getElementById('main-interface').classList.add('hidden');
            document.getElementById('chat-screen').classList.add('hidden');
        }

        // ====== SOCKET ======
        function connectSocket(userId) {
            if (socket) socket.disconnect();

            socket = io(window.location.origin, {
                query: { user_id: userId },
                transports: ['websocket', 'polling']
            });

            socket.on('connect', () => {
                console.log('✅ Connected');
                myUser = { id: userId, username: '' };
                document.getElementById('display-userid').textContent = userId;
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-interface').classList.remove('hidden');
                loadAllUsers();
            });

            socket.on('connect_error', (err) => {
                console.error('❌', err);
                showLoginMsg('Не удалось подключиться', 'error');
            });

            socket.on('disconnect', () => {
                showToast('Соединение потеряно');
            });

            socket.on('status_update', (data) => {
                const user = allUsers.find(u => u.id === data.user_id);
                if (user) user.status = data.status;
                renderFriends();
                if (currentFriend && currentFriend.id === data.user_id) {
                    updateChatFriendStatus(data.status);
                }
            });

            socket.on('friend_added', (data) => {
                const el = document.getElementById('add-friend-msg');
                if (data.success) {
                    el.innerHTML = `<span class="success">✓ ${data.message}</span>`;
                    loadAllUsers();
                } else {
                    el.innerHTML = `<span class="error">✗ ${data.message}</span>`;
                }
                setTimeout(() => el.innerHTML = '', 3500);
            });

            socket.on('chat_history', (history) => {
                renderChatHistory(history);
            });

            socket.on('new_message', (data) => {
                if (currentFriend &&
                    (data.sender_id === currentFriend.id || data.sender_id === myUser.id)) {
                    appendBubble(data);
                }
            });

            socket.on('notification', (data) => {
                showToast(`📩 ${data.from}: ${data.message}`);
            });
        }

        // ====== ЗАГРУЗКА ПОЛЬЗОВАТЕЛЕЙ ======
        async function loadAllUsers() {
            try {
                const res = await fetch('/api/users');
                if (!res.ok) throw new Error();
                const users = await res.json();
                allUsers = users.filter(u => u.id !== myUser.id);
                const me = users.find(u => u.id === myUser.id);
                if (me) {
                    myUser.username = me.username;
                    document.getElementById('display-username').textContent = me.username;
                    document.getElementById('avatar-letter').textContent = me.username.charAt(0).toUpperCase();
                }
                renderFriends();
            } catch (e) {
                console.error('Ошибка загрузки пользователей');
            }
        }

        function renderFriends() {
            const container = document.getElementById('friends-list');
            if (allUsers.length === 0) {
                container.innerHTML = '<div class="empty-friends">Пока никого нет</div>';
                return;
            }
            container.innerHTML = allUsers.map(u => {
                const activeClass = (currentFriend && currentFriend.id === u.id) ? ' active' : '';
                const statusClass = u.status === 'online' ? 'online' : 'offline';
                return `
                    <div class="friend-item${activeClass}" onclick="openChatUser('${u.id}')">
                        <div class="friend-avatar">${u.username.charAt(0).toUpperCase()}</div>
                        <div class="friend-info">
                            <div class="friend-name">${u.username}</div>
                            <div class="friend-status-text">${u.status === 'online' ? 'В сети' : 'Не в сети'}</div>
                        </div>
                        <div class="status-dot ${statusClass}"></div>
                    </div>
                `;
            }).join('');
        }

        // ====== ДОБАВЛЕНИЕ ДРУГА ======
        function doAddFriend() {
            const friendId = document.getElementById('input-friend-id').value.trim();
            const el = document.getElementById('add-friend-msg');
            if (!friendId) {
                el.innerHTML = '<span class="error">Введите ID</span>';
                setTimeout(() => el.innerHTML = '', 3000);
                return;
            }
            if (friendId === myUser.id) {
                el.innerHTML = '<span class="error">Нельзя добавить себя</span>';
                setTimeout(() => el.innerHTML = '', 3000);
                return;
            }
            if (socket && socket.connected) {
                socket.emit('add_friend', { user_id: myUser.id, friend_id: friendId });
            }
            document.getElementById('input-friend-id').value = '';
        }

        // ====== ЧАТ ======
        function openChatUser(friendId) {
            const friend = allUsers.find(u => u.id === friendId);
            if (!friend) return;
            currentFriend = friend;
            document.getElementById('chat-friend-name').textContent = friend.username;
            updateChatFriendStatus(friend.status);
            document.getElementById('chat-screen').classList.remove('hidden');
            document.getElementById('chat-messages').innerHTML = '<div class="empty-chat-message">Загрузка...</div>';
            if (socket && socket.connected) {
                socket.emit('join_chat', { user_id: myUser.id, friend_id: friendId });
            }
            renderFriends();
        }

        function closeChat() {
            currentFriend = null;
            document.getElementById('chat-screen').classList.add('hidden');
            renderFriends();
        }

        function updateChatFriendStatus(status) {
            const el = document.getElementById('chat-friend-status');
            if (status === 'online') {
                el.innerHTML = '<span class="dot online"></span> В сети';
            } else {
                el.innerHTML = '<span class="dot offline"></span> Не в сети';
            }
        }

        function renderChatHistory(history) {
            const container = document.getElementById('chat-messages');
            container.innerHTML = '';
            if (!history || history.length === 0) {
                container.innerHTML = '<div class="empty-chat-message">Нет сообщений</div>';
                return;
            }
            history.forEach(m => appendBubble(m));
            container.scrollTop = container.scrollHeight;
        }

        function appendBubble(data) {
            const container = document.getElementById('chat-messages');
            const empty = container.querySelector('.empty-chat-message');
            if (empty) empty.remove();

            const isMine = data.sender_id === myUser.id;
            const div = document.createElement('div');
            div.className = `message ${isMine ? 'sent' : 'received'}`;

            if (!isMine) {
                const sender = document.createElement('div');
                sender.className = 'message-sender';
                sender.textContent = data.sender_name;
                div.appendChild(sender);
            }

            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            bubble.textContent = data.message;
            div.appendChild(bubble);

            const time = document.createElement('div');
            time.className = 'message-time';
            time.textContent = data.timestamp;
            div.appendChild(time);

            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function sendMessage() {
            const input = document.getElementById('input-message');
            const text = input.value.trim();
            if (!text || !currentFriend || !socket || !socket.connected) return;
            socket.emit('send_message', {
                user_id: myUser.id,
                friend_id: currentFriend.id,
                message: text
            });
            input.value = '';
            input.focus();
        }

        function handleEnter(e) {
            if (e.key === 'Enter') sendMessage();
        }
    </script>
</body>
</html>
